version: "3.8"
services:
  postgres:
    image: "postgres:latest"
    ports:
      - 5428:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - postgres-db-network
networks:
  postgres-db-network:
    driver: bridge
